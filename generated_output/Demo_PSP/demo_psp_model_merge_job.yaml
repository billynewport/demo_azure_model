# model-merge-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: demo-psp-model-merge-job
  namespace: ds-nightly
spec:
  template:
    spec:
      containers:
      - name: model-merge-handler
        image: registry.gitlab.com/datasurface-inc/datasurface/datasurface:v1.3.5
        command: ["/bin/bash"]
        args:
        - -c
        - |
          echo "Starting DataSurface model merge handler"

          python -m datasurface.cmd.platform handleModelMerge \
            --git-repo-path /cache/git-cache \
            --git-repo-type github \
            --git-repo-url https://github.com \
            --git-repo-owner billynewport \
            --git-repo-name demo_azure_model \
            --git-repo-branch main \
            --rte-name demo \
            --git-platform-repo-credential-name git \
            --use-git-cache \
            --max-cache-age-minutes 5 \
            --output /workspace/generated_artifacts \
            --psp Demo_PSP

          echo "Model merge handler complete"
        env:
        - name: PYTHONPATH
          value: "/app/src"

        - name: git_TYPE
          value: "API_TOKEN"

        - name: git_TOKEN
          valueFrom:
            secretKeyRef:
              name: git
              key: TOKEN


        - name: sqlserver-demo-merge_TYPE
          value: "USER_PASSWORD"

        - name: sqlserver-demo-merge_USER
          valueFrom:
            secretKeyRef:
              name: sqlserver-demo-merge
              key: USER
        - name: sqlserver-demo-merge_PASSWORD
          valueFrom:
            secretKeyRef:
              name: sqlserver-demo-merge
              key: PASSWORD


        volumeMounts:

        - name: git-model-cache
          mountPath: /cache/git-cache

        - name: workspace
          mountPath: /workspace
      volumes:

      - name: git-model-cache
        persistentVolumeClaim:
          claimName: git-cache-pvc

      - name: workspace
        emptyDir: {}
      restartPolicy: Never
  backoffLimit: 3